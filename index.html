<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vortex Tier</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background-color: #0b0e14; color: #fff; }

        /* ল্যান্ডিং পেজ স্টাইল */
        #landing-page {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: linear-gradient(rgba(11, 14, 20, 0.9), rgba(11, 14, 20, 0.9)), url('https://i0.wp.com/highschool.latimes.com/wp-content/uploads/2021/07/minecraft.jpeg?fit=1920%2C1080&ssl=1');
            background-size: cover;
        }
        #landing-page h1 { font-size: 3.5rem; color: #f08a24; margin-bottom: 10px; }
        #landing-page p { font-size: 1.2rem; color: #8b949e; margin-bottom: 20px; }
        .view-btn { padding: 12px 30px; background: #f08a24; border: none; color: white; font-weight: bold; cursor: pointer; border-radius: 6px; }

        /* মূল ওয়েবসাইট লুকানো */
        #main-content { display: none; padding: 20px; }

        /* হেডার স্টাইল */
        header { display: flex; justify-content: space-between; align-items: center; background: #161b22; padding: 15px 25px; border-radius: 8px; margin-bottom: 20px; }
        .discord-btn { background: #5865F2; color: white; padding: 8px 15px; border-radius: 6px; text-decoration: none; font-size: 0.9rem; }
    </style>
</head>
<body>

<!-- ল্যান্ডিং পেজ -->
<div id="landing-page">
    <h1>Vortex Tier</h1>
    <p>The #1 Cracked & Premium Tierlist</p>
    <button class="view-btn" onclick="showWebsite()">⚡ View Tier List</button>
</div>

<!-- মূল ওয়েবসাইট কন্টেন্ট -->
<div id="main-content">
    <header>
        <h2>Vortex Tier</h2>
        <a href="https://discord.gg/CNnWfV99m8" class="discord-btn">Join Discord</a>
    </header>
    
    <!-- আপনার টেবিল এবং অন্যান্য কন্টেন্ট এখানে রাখুন -->
    <div style="color: #c9d1d9;">
        এখানে আপনার টিয়ার লিস্টের টেবিল থাকবে।
    </div>
</div>

<script>
    function showWebsite() {
        document.getElementById('landing-page').style.display = 'none';
        document.getElementById('main-content').style.display = 'block';
    }
</script>

</body>
</html>
