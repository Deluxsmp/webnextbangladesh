<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vortex Tier</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #0b0e14; color: #c9d1d9; }

        /* ল্যান্ডিং পেজ */
        #landing-page {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 70% 30%, #1e1e3f 0%, #050508 70%);
            display: flex; flex-direction: column; justify-content: center; align-items: flex-start;
            padding: 50px; z-index: 1000;
        }
        .badge { background: #1a202c; color: #6366f1; padding: 4px 10px; border-radius: 20px; margin-bottom: 20px; border: 1px solid #312e81; font-size: 0.8rem; }
        
        /* মেইন কন্টেন্ট স্টাইল */
        #main-content { display: none; padding: 20px; max-width: 1200px; margin: 0 auto; }
        header { background: #161b22; padding: 20px; border-radius: 8px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .overall-table { width: 100%; background: #161b22; border-radius: 8px; border-collapse: collapse; }
        .overall-table th, .overall-table td { padding: 12px; border-bottom: 1px solid #21262d; text-align: left; }
    </style>
</head>
<body>

<!-- ল্যান্ডিং পেজ -->
<div id="landing-page">
    <div class="badge">● Season 1 Active ● LIVE</div>
    <h1 style="font-size: 3rem; margin-bottom: 20px;">The #1 Cracked<br>& Premium Tierlist</h1>
    <button onclick="showWebsite()" style="padding: 12px 25px; background: #6366f1; border: none; color: white; border-radius: 6px; cursor: pointer; font-weight: bold;">⚡ View Tier List</button>
</div>

<!-- মেইন ওয়েবসাইট -->
<div id="main-content">
    <header>
        <h1>Vortex Tier</h1>
        <div style="display:flex; gap:10px;">
            <a href="https://discord.gg/CNnWfV99m8" style="background: #5865F2; color: white; padding: 8px 15px; border-radius: 6px; text-decoration: none;">Discord</a>
            <input type="text" id="tierSearch" placeholder="Search player..." onkeyup="liveSearch()" style="padding: 8px; border-radius: 6px; border: 1px solid #30363d; background: #0b0e14; color: white;">
        </div>
    </header>

    <table class="overall-table">
        <thead><tr><th>#</th><th>Player</th><th>Game Modes & Tiers</th></tr></thead>
        <tbody id="playerTable">
            <tr class="player-row-item">
                <td class="rank-col">1.</td>
                <td><span class="player-name">normie_insaan</span></td>
                <td>Combat Master</td>
            </tr>
        </tbody>
    </table>
</div>

<script>
    function showWebsite() {
        document.getElementById('landing-page').style.display = 'none';
        document.getElementById('main-content').style.display = 'block';
    }

    function liveSearch() {
        var input = document.getElementById('tierSearch').value.toUpperCase();
        var rows = document.getElementsByClassName('player-row-item');
        for (var i = 0; i < rows.length; i++) {
            var name = rows[i].getElementsByClassName('player-name')[0].innerText;
            rows[i].style.display = name.toUpperCase().indexOf(input) > -1 ? "" : "none";
        }
    }
</script>

</body>
</html>
